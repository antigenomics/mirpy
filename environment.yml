# Conda environment for mirpy v3 development.
#
# Minimal: Python + pip only (v3 is a pure-Python package — no C build). All
# dependencies come from the editable pip install; `setup.sh` also editable-installs
# the co-developed siblings (../seqtree, ../vdjtools) when present.
#
#   conda env create -f environment.yml
#   conda activate mirpy
#   bash setup.sh              # or: pip install -e ".[dev,bench]"
name: mirpy
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
