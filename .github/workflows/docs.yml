name: Deploy Docs

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# One global queue: the Pages artifact is the whole project site, so concurrent
# main/dev deploys must run sequentially rather than clobber each other.
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1

      # Pull-request / manual run: just build the checked-out branch to validate
      # (no deploy).
      - name: Validate docs build (no deploy)
        if: github.event_name != 'push'
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"
          sphinx-build -b html docs docs/_build/html

      # Push to main or dev: assemble the combined project site — main at the
      # artifact root (https://docs.isalgo.dev/mirpy/) and dev under /dev
      # (https://docs.isalgo.dev/mirpy/dev/). Both branches are rebuilt every
      # deploy because the artifact replaces the whole site. The dev build is
      # best-effort so a broken dev build never blocks the main deploy.
      - name: Build combined site (main + dev)
        if: github.event_name == 'push'
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          BASE: https://docs.isalgo.dev/mirpy
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          mkdir -p site

          build_branch() {   # $1 = branch, $2 = dest subdir ("" = root), $3 = baseurl
            local branch="$1" dest="$2" baseurl="$3" src="src-$1"
            rm -rf "$src"
            git clone --depth 1 --branch "$branch" "$REPO_URL" "$src"
            # Swap in this branch's package for autodoc (deps already present
            # after the first branch's install), then ensure docs extras.
            pip install "./$src" --force-reinstall --no-deps
            pip install "./$src[docs]"
            sphinx-build -b html -D html_baseurl="$baseurl/${dest:+$dest/}" \
              "$src/docs" "site/${dest}"
          }

          build_branch main "" "$BASE"
          build_branch dev "dev" "$BASE" \
            || echo "::warning::dev docs build failed; deploying without /dev"

          touch site/.nojekyll
          echo "docs.isalgo.dev" > site/CNAME

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
