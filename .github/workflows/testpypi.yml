name: Publish To TestPyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source distribution
        run: python -m build --sdist

      - name: Check source distribution
        run: python -m twine check dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-13
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"
          CIBW_TEST_COMMAND: "python -c \"import mir; print('mirpy-lib OK')\""

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-testpypi:
    name: Publish To TestPyPI
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist/

      - name: Validate package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          version = pyproject['project']['version']
          ref = "${{ github.ref_name }}"

          normalized_tag = ref[1:] if ref.startswith('v') else ref
          if version != normalized_tag:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml has {version}, tag is {ref}"
              )

          print(f"Version check passed: {version} == {ref}")
          PY

      - name: List distributions
        run: ls -R dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
