name: Test Suite

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Fast tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Copy tests to temp directory
        run: >-
          python -c "import pathlib, shutil;
          src = pathlib.Path(r'${{ github.workspace }}') / 'tests';
          dst = pathlib.Path(r'${{ runner.temp }}') / 'tests';
          shutil.rmtree(dst, ignore_errors=True);
          shutil.copytree(src, dst)"

      - name: Run fast test suite
        working-directory: ${{ runner.temp }}
        run: python -m pytest tests -m "not benchmark and not integration" -q

  test-heavy:
    name: Heavy tests on ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Copy tests to temp directory
        run: >-
          python -c "import pathlib, shutil;
          src = pathlib.Path(r'${{ github.workspace }}') / 'tests';
          dst = pathlib.Path(r'${{ runner.temp }}') / 'tests';
          shutil.rmtree(dst, ignore_errors=True);
          shutil.copytree(src, dst)"

      - name: Run benchmark and integration suites
        env:
          RUN_BENCHMARKS: "1"
          RUN_INTEGRATION: "1"
        working-directory: ${{ runner.temp }}
        run: python -m pytest tests -m "benchmark or integration" -q
