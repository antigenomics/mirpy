name: Test Suite

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Fast tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Install package
        run: python -m pip install .

      - name: Run fast test suite
        run: python -m pytest tests -m "not benchmark and not integration" -q

  test-heavy:
    name: Heavy tests on ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Install package
        run: python -m pip install .

      - name: Run benchmark and integration suites
        env:
          RUN_BENCHMARKS: "1"
          RUN_INTEGRATION: "1"
        run: python -m pytest tests -m "benchmark or integration" -q
