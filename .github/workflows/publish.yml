name: Publish To PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source distribution
        run: python -m build --sdist

      - name: Check source distribution
        run: python -m twine check dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest   # Apple Silicon arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          # Skip 32-bit targets — not needed for a scientific library.
          # Skip musl (Alpine) Linux — heavy scipy/numpy stack builds poorly there.
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"
          # Skip testing: dependencies with compilation requirements (Rust, C++) aren't available in CI.
          # Package testing happens in separate tests.yml workflow; publish should only build wheels.
          CIBW_TEST_SKIP: "*"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  test-wheels:
    name: Test wheels
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: python-wheels-ubuntu-latest
            python-version: "3.11"
            py_tag: cp311
          - os: ubuntu-latest
            artifact: python-wheels-ubuntu-latest
            python-version: "3.12"
            py_tag: cp312
          - os: ubuntu-latest
            artifact: python-wheels-ubuntu-latest
            python-version: "3.13"
            py_tag: cp313
          - os: windows-latest
            artifact: python-wheels-windows-latest
            python-version: "3.11"
            py_tag: cp311
          - os: windows-latest
            artifact: python-wheels-windows-latest
            python-version: "3.12"
            py_tag: cp312
          - os: windows-latest
            artifact: python-wheels-windows-latest
            python-version: "3.13"
            py_tag: cp313
          - os: macos-latest
            artifact: python-wheels-macos-latest
            python-version: "3.11"
            py_tag: cp311
          - os: macos-latest
            artifact: python-wheels-macos-latest
            python-version: "3.12"
            py_tag: cp312
          - os: macos-latest
            artifact: python-wheels-macos-latest
            python-version: "3.13"
            py_tag: cp313
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wheels/

      - name: List wheels
        shell: bash
        run: ls -la wheels/

      - name: Install and test wheel
        shell: bash
        run: |
          pip install --upgrade pip
          python - <<'PY'
          from glob import glob
          from subprocess import check_call
          import sys

          pattern = "wheels/mirpy_lib-*-${{ matrix.py_tag }}-*.whl"
          matches = sorted(glob(pattern))
          if len(matches) != 1:
              raise SystemExit(f"Expected exactly one wheel for pattern {pattern}, found {len(matches)}: {matches}")
          check_call([sys.executable, "-m", "pip", "install", matches[0]])
          PY
          python -c "import mir; print('[OK] mir module imports successfully')"

  publish:
    name: Publish To PyPI
    needs:
      - build-sdist
      - build-wheels
      - test-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist/

      - name: Validate package version matches release tag
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          version = pyproject['project']['version']
          release_tag = "${{ github.event.release.tag_name }}"

          normalized_tag = release_tag[1:] if release_tag.startswith('v') else release_tag
          if version != normalized_tag:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml has {version}, release tag is {release_tag}"
              )

          print(f"Version check passed: {version} == {release_tag}")
          PY

      - name: List distributions
        run: ls -R dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
