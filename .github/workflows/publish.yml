name: Publish To PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source distribution
        run: python -m build --sdist

      - name: Check source distribution
        run: python -m twine check dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-13       # Intel x86_64
          - macos-latest   # Apple Silicon arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          # Skip 32-bit targets — not needed for a scientific library.
          # Skip musl (Alpine) Linux — heavy scipy/numpy stack builds poorly there.
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"
          # Verify the compiled extension loads correctly after each wheel build.
          CIBW_TEST_COMMAND: "python -c \"import mir; print('mirpy-lib OK')\""

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: Publish To PyPI
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist/

      - name: List distributions
        run: ls -R dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
