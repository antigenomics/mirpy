name: Publish To PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      # Pure-Python (hatchling): one sdist + one py3-none-any wheel, no cibuildwheel matrix.
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish:
    name: Publish To PyPI
    needs: [build]
    # Only a published GitHub Release publishes to PyPI; workflow_dispatch runs build as a dry run
    # (no upload, never enters the pypi environment) so the release build can be tested.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Validate package version matches release tag
        run: |
          # PEP 440 comparison, so a tag like v3.1.0-alpha.0 matches pyproject version 3.1.0a0.
          python -m pip install --quiet packaging
          python - <<'PY'
          import tomllib
          from pathlib import Path
          from packaging.version import Version
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = "${{ github.event.release.tag_name }}"
          norm = tag[1:] if tag.startswith("v") else tag
          if Version(version) != Version(norm):
              raise SystemExit(f"Version mismatch: pyproject.toml={version!r} != tag {tag!r} (normalized {norm!r})")
          print(f"Version OK: pyproject {version} == tag {tag}")
          PY
      - name: List distributions
        run: ls -R dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
